<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas AI Assistant</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <p class="eyebrow">Canvas AI Assistant</p>
        <h1>Course Materials</h1>
      </header>

      <section class="prompt-card" aria-label="Prompt">
        <textarea
          id="semanticPrompt"
          rows="4"
          placeholder="Ask about your course materials..."
          aria-label="Prompt"
        ></textarea>
      </section>

      <section class="actions" aria-label="Course material actions">
        <button id="loadMaterialsBtn" type="button">Collect Course Materials</button>
      </section>

      <section class="status-card" aria-label="Canvas page">
        <h2>Current Page</h2>
        <p id="pageContext">Checking active tab...</p>
      </section>

      <section class="status-card" aria-live="polite">
        <h2>Status</h2>
        <p id="status">Open a Canvas course page, then collect course materials.</p>
      </section>

      <section class="summary-card" id="summary" hidden></section>

      <section class="materials-section">
        <h2>Materials</h2>
        <div id="materialsList" class="materials-list">
          <p class="empty-state">No materials loaded yet.</p>
        </div>
      </section>
    </main>

    <script src="../canvas/detect.js"></script>
    <script src="../settings/canvas-domains.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
