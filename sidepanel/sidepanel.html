<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas AI Assistant</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <p class="eyebrow">Canvas AI Assistant</p>
        <h1>Ask smarter questions about the current Canvas page.</h1>
      </header>

      <section class="actions" aria-label="Page data actions">
        <button id="extractBtn" type="button">Extract Page Data</button>
        <button id="sendBtn" type="button">Send to Backend</button>
      </section>

      <section class="status-card" aria-live="polite">
        <h2>Status</h2>
        <p id="status">No data extracted yet.</p>
      </section>

      <section>
        <h2>Extracted Data</h2>
        <pre id="output">No data extracted yet.</pre>
      </section>
    </main>

    <script src="sidepanel.js"></script>
  </body>
</html>
