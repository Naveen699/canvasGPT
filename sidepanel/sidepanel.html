<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas AI Assistant</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <p class="eyebrow">Canvas AI Assistant</p>
        <h1>Visible Course Materials</h1>
      </header>

      <section class="actions" aria-label="Course material actions">
        <button id="loadMaterialsBtn" type="button">Load Visible Course Materials</button>
      </section>

      <section class="status-card" aria-label="Canvas page">
        <h2>Current Page</h2>
        <p id="pageContext">Checking active tab...</p>
      </section>

      <section class="status-card" aria-live="polite">
        <h2>Status</h2>
        <p id="status">Open a Canvas course page, then load visible materials.</p>
      </section>

      <section class="settings-card" aria-label="Canvas domain settings">
        <h2>Canvas Domains</h2>
        <p id="domainHelp">Default: *.instructure.com, canvas.case.edu</p>
        <form id="domainForm" class="domain-form">
          <input
            id="domainInput"
            type="text"
            autocomplete="off"
            placeholder="school.instructure.com"
            aria-label="Canvas domain"
          />
          <button id="addDomainBtn" type="submit">Add Domain</button>
        </form>
        <p id="domainList" class="domain-list"></p>
      </section>

      <section class="summary-card" id="summary" hidden></section>

      <section class="materials-section">
        <h2>Materials</h2>
        <div id="materialsList" class="materials-list">
          <p class="empty-state">No materials loaded yet.</p>
        </div>
      </section>
    </main>

    <script src="../canvas/detect.js"></script>
    <script src="../settings/canvas-domains.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
